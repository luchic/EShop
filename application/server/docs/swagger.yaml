basePath: /
definitions:
  api.CreateProductRequest:
    properties:
      description:
        type: string
      name:
        type: string
      price:
        type: number
      stock:
        type: integer
    type: object
  api.GetProductsRequest:
    properties:
      name:
        type: string
    type: object
  api.GetProductsResponse:
    properties:
      description:
        type: string
      id:
        type: integer
      name:
        type: string
      price:
        type: number
      stock:
        type: integer
    type: object
  api.GetUserByIdRequest:
    properties:
      email:
        type: string
    type: object
  api.GetUserProfileResponse:
    properties:
      email:
        type: string
      first_name:
        type: string
      second_name:
        type: string
    type: object
  api.LoginResponse:
    properties:
      email:
        type: string
      expires_at:
        type: integer
      session_id:
        type: string
      user_id:
        type: integer
    type: object
  api.LoginUser:
    properties:
      email:
        type: string
      password:
        type: string
    type: object
  api.RegisterUser:
    properties:
      email:
        type: string
      first_name:
        type: string
      password:
        type: string
      second_name:
        type: string
    type: object
  api.User:
    properties:
      createdAt:
        type: string
      email:
        type: string
      firstName:
        type: string
      id:
        type: integer
      password:
        items:
          type: integer
        type: array
      role:
        type: string
      secondName:
        type: string
    type: object
host: localhost:8080
info:
  contact: {}
  description: Theodor's Emporium backend API.
  title: Shop API
  version: "1.0"
paths:
  /products:
    post:
      consumes:
      - application/json
      description: Searches for products matching the given name
      parameters:
      - description: Product name to search
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/api.GetProductsRequest'
      produces:
      - application/json
      responses:
        "200":
          description: List of matching products
          schema:
            items:
              $ref: '#/definitions/api.GetProductsResponse'
            type: array
        "400":
          description: Bad Request
          schema:
            type: string
        "401":
          description: Unauthorized
          schema:
            type: string
        "405":
          description: Method not allowed
          schema:
            type: string
        "500":
          description: Internal Error
          schema:
            type: string
      security:
      - ApiKeyAuth: []
      summary: Get products by name
      tags:
      - products
  /products/{id}:
    get:
      description: Return the product by id
      parameters:
      - description: Product ID
        format: int64
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: Product found
          schema:
            $ref: '#/definitions/api.GetProductsResponse'
        "400":
          description: Bad Request
          schema:
            type: string
        "401":
          description: Unauthorized
          schema:
            type: string
        "405":
          description: Method not allowed
          schema:
            type: string
        "500":
          description: Internal Error
          schema:
            type: string
      security:
      - ApiKeyAuth: []
      summary: Get products by id
      tags:
      - products
  /products/create:
    post:
      consumes:
      - application/json
      description: Creates a new product in the shop catalog
      parameters:
      - description: Product to create
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/api.CreateProductRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Product created
        "400":
          description: Bad Request
          schema:
            type: string
        "401":
          description: Unauthorized
          schema:
            type: string
        "405":
          description: Method not allowed
          schema:
            type: string
        "500":
          description: Internal Error
          schema:
            type: string
      security:
      - ApiKeyAuth: []
      summary: Create a new product
      tags:
      - products
  /user/info:
    post:
      consumes:
      - application/json
      parameters:
      - description: User Email
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/api.GetUserByIdRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/api.User'
        "400":
          description: Bad request
          schema:
            type: string
        "401":
          description: Unauthorized
          schema:
            type: string
        "500":
          description: Internal server error
          schema:
            type: string
      summary: Get User
      tags:
      - users
  /user/login:
    post:
      consumes:
      - application/json
      parameters:
      - description: Login payload
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/api.LoginUser'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/api.LoginResponse'
        "400":
          description: Bad request
          schema:
            type: string
        "401":
          description: Unauthorized
          schema:
            type: string
        "500":
          description: Internal server error
          schema:
            type: string
      summary: Login
      tags:
      - users
  /user/logout:
    get:
      responses:
        "200":
          description: Logged out successfully
        "400":
          description: Bad request
          schema:
            type: string
        "401":
          description: Unauthorized
          schema:
            type: string
        "500":
          description: Internal server error
          schema:
            type: string
      summary: Logout User
      tags:
      - users
  /user/me:
    get:
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/api.GetUserProfileResponse'
        "400":
          description: Bad request
          schema:
            type: string
        "500":
          description: Internal server error
          schema:
            type: string
      summary: Get User Profile
      tags:
      - users
  /user/register:
    post:
      consumes:
      - application/json
      parameters:
      - description: Registration payload
        in: body
        name: body
        required: true
        schema:
          $ref: '#/definitions/api.RegisterUser'
      produces:
      - text/plain
      responses:
        "201":
          description: Created
        "400":
          description: Bad request
          schema:
            type: string
      summary: Register a new user
      tags:
      - users
swagger: "2.0"
