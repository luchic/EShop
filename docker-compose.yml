services:
  server:
    build:
      context: ./application
      dockerfile: Dockerfile
    networks:
      - shop-net
    ports:
      - "8080:8080"

    depends_on:
      shop-redis:
        condition: service_healthy
      shop-db:
        condition: service_healthy

    restart: unless-stopped

  shop-redis:
    image: redis:latest
    container_name: shop-redis
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 2s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

    networks:
      - shop-net
    
  shop-db:
    image: postgres:17-alpine
    container_name: shop-postgres
    environment:
      POSTGRES_DB: shop
      POSTGRES_USER: shop
      POSTGRES_PASSWORD: shop
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U shop -d shop"]
      interval: 2s
      timeout: 5s
      retries: 10
    restart: unless-stopped
    networks:
      - shop-net

  adminer:
    image: adminer:4
    container_name: shop-adminer
    environment:
      ADMINER_DEFAULT_SERVER: postgres
    ports:
      - "8081:8080"
    depends_on:
      shop-db:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - shop-net
  
  migration:
    build:
      context: ./application
      dockerfile: Dockerfile.Migration
    
    networks:
      - shop-net
    depends_on:
      shop-db:
        condition: service_healthy

  nginx:
    build:
      context: ./nginx
      dockerfile: Dockerfile
    container_name: nginx
    ports:
      - "8082:80"
    restart: on-failure:5
    depends_on:
      - server
    networks:
      - shop-net
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
      - web-data:/var/www/html
volumes:
  postgres-data:

  redis-data:

  web-data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ./nginx/html	

networks:
  shop-net:
    driver: bridge
  