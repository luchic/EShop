<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<link rel="stylesheet" href="styles.css">
	<link rel="stylesheet" href="user_styles.css">
	<title>42 Shop: User</title>
</head>
<body>
	<header class="banner">
		<a class="catalog-button" href="./index.html" >HOME</a>
		<div class="banner-padding"></div>
		<a class="catalog-button" href="./catalog.html" >CATALOG</a>
		<div class="banner-padding"></div>
		<a class="user-button" href="./user.html" ><img class="user-icon" src="default_user_icon.png" alt="user_icon">USER SETTINGS</a>
	</header>
	<main class="user-page">

		<!-- LEFT SIDE -->
		<section class="user-left">
			<img class="user-icon-big" src="default_user_icon.png" alt="user_icon">

			<div class="currency-box">
				<label>42coin:</label>
				<input type="text" value="1000" readonly>
			</div>
		</section>

		<!-- RIGHT SIDE -->
		<section class="user-right">
			<h2>Purchase History</h2>

			<table class="purchase-table">
				<thead>
					<tr>
						<th>Image</th>
						<th>Product</th>
						<th>Price</th>
					</tr>
				</thead>
				<tbody id="purchase-body">
					<!-- JS will insert rows here -->
				</tbody>
			</table>

			<div class="pagination">
				<button id="prev-btn">Prev</button>
				<span id="page-info"></span>
				<button id="next-btn">Next</button>
			</div>
		</section>

	</main>
	<script src="user_page.js"></script>
</body>
</html>
